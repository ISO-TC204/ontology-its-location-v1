site_name: METR - Ontology
site_description: A registry for documenting the ontology of METR terms
repo_url: https://github.com/k-vaughn/ontology-metr
nav:
- Home: index.md
- Ontology for ITS Location Referencing:
  - Location Pattern (itsLocation):
    - Area Destination: classes/itsLocation__AreaDestination.md
    - Area Location: classes/itsLocation__AreaLocation.md
    - Destination: classes/itsLocation__Destination.md
    - Indexed Location: classes/itsLocation__IndexedLocation.md
    - Itinerary: classes/itsLocation__Itinerary.md
    - Itinerary By Indexed Locations: classes/itsLocation__ItineraryByIndexedLocations.md
    - Jurisdictional Entity: classes/itsLocation__JurisdictionalEntity.md
    - Linear Location: classes/itsLocation__LinearLocation.md
    - Location: classes/itsLocation__Location.md
    - Location Group: classes/itsLocation__LocationGroup.md
    - Location Group By List: classes/itsLocation__LocationGroupByList.md
    - Location Reference (itsLocation): classes/itsLocation__LocationReference.md
    - Location Thing: classes/itsLocation__LocationThing.md
    - Named Area: classes/itsLocation__NamedArea.md
    - Network Location: classes/itsLocation__NetworkLocation.md
    - Point Coordinates: classes/itsLocation__PointCoordinates.md
    - Point Destination: classes/itsLocation__PointDestination.md
    - Point Location: classes/itsLocation__PointLocation.md
    - Position Confidence Ellipse: classes/itsLocation__PositionConfidenceEllipse.md
    - Supplementary Positional Description: classes/itsLocation__SupplementaryPositionalDescription.md
- OpenLR Ontology:
  - Circle Location Reference (OpenLR): classes/OpenLR__CircleLocationReference.md
  - Closed Line Location Reference (OpenLR): classes/OpenLR__ClosedLineLocationReference.md
  - Coordinates (OpenLR): classes/OpenLR__Coordinates.md
  - Form Of Way (OpenLR): classes/OpenLR__FormOfWay.md
  - Functional Road Class (OpenLR): classes/OpenLR__FunctionalRoadClass.md
  - Geo Coordinate Location Reference (OpenLR): classes/OpenLR__GeoCoordinateLocationReference.md
  - Grid Location Reference (OpenLR): classes/OpenLR__GridLocationReference.md
  - Line Attributes (OpenLR): classes/OpenLR__LineAttributes.md
  - Line Location Reference (OpenLR): classes/OpenLR__LineLocationReference.md
  - Location Reference (OpenLR): classes/OpenLR__LocationReference.md
  - Location Reference Point (OpenLR): classes/OpenLR__LocationReferencePoint.md
  - Open LR Thing (OpenLR): classes/OpenLR__OpenLRThing.md
  - Orientation (OpenLR): classes/OpenLR__Orientation.md
  - Path Attributes (OpenLR): classes/OpenLR__PathAttributes.md
  - Point Along Line Location Reference (OpenLR): classes/OpenLR__PointAlongLineLocationReference.md
  - Poi With Access Point Location Reference (OpenLR): classes/OpenLR__PoiWithAccessPointLocationReference.md
  - Polygon Location Reference (OpenLR): classes/OpenLR__PolygonLocationReference.md
  - Rectangle Location Reference (OpenLR): classes/OpenLR__RectangleLocationReference.md
  - Side Of Road (OpenLR): classes/OpenLR__SideOfRoad.md
site_url: https://github.com/k-vaughn/ontology-metr
